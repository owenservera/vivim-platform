500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502 [did:key:z9Xr...] via Link                        \u2502  \u2502\n\u2502  \u2502  \"Prompt engineering patterns for code review\"    \u2502  \u2502\n\u2502  \u2502   \u2705 Absorbed \u00b7 3 ACUs added to your memory       \u2502  \u2502\n\u2502  \u2502  [View Absorbed ACUs]  [Remove from Memory]       \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nEach inbound share shows:\n- Sender's DID (or display name if they are in a Circle where names are enabled)\n- Source Circle or link type\n- The pulse annotation\n- Context Handoff badge: how many concepts match existing memory vs. how many are new\n- Actions: Open in Context (runs full Context Handoff flow), Absorb All (immediately copies all ACUs), Skip\n\n---\n\n## 13H \u2014 COLLECTIONS\n\nCollections are the organizational backbone of the Archive. They are intentionally simple but powerful.\n\n### What a Collection Is\n\nA Collection is a named, ordered list of conversations with an optional description, cover image (auto-generated from conversation topics), and visibility setting. It is not a folder \u2014 conversations are not \"in\" a Collection, they are \"referenced by\" it, and can belong to any number of Collections simultaneously.\n\n### Collection Creation Flows\n\n**Manual:** User taps \"+ New Collection\", names it, optionally describes it, then adds conversations by dragging from the Archive or using the \"Add to Collection\" action on any card.\n\n**AI-Suggested:** After the Archive reaches 50+ conversations, a \"Suggested Collections\" section appears in the Collections zone. The AI analyzes conversation clusters by ACU topic similarity and proposes collection names: \"Your React work (18 conversations),\" \"Trip planning (7 conversations),\" \"Machine Learning fundamentals (23 conversations).\" The user accepts, edits, or dismisses each suggestion.\n\n**Canvas Selection:** In Canvas mode, the user can box-select a cluster of nodes and create a Collection directly from the selection.\n\n### Collection Detail View\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  \u2190 Collections                                              \u2502\n\u2502                                                              \u2502\n\u2502  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588  Machine Learning Fundamentals        \u2502\n\u2502  [Generated cover]      23 conversations \u00b7 Private          \u2502\n\u2502                          \"Everything I've learned about     \u2502\n\u2502                           ML concepts, from basics to...\"   \u2502\n\u2502                                                              \u2502\n\u2502  [+ Add Conversation]  [Share Collection]  [Export]  [\u00b7\u00b7\u00b7]  \u2502\n\u2502                                                              \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502  SORT: [Added \u25be]  VIEW: [List][Grid][Canvas]                \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502                                                              \u2502\n\u2502  [Conversation cards here \u2014 same as Archive views]          \u2502\n\u2502                                                              \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502  AI SYNTHESIS  \u2728                              [Regenerate]  \u2502\n\u2502  \"Across these 23 conversations, your understanding of      \u2502\n\u2502   ML has evolved from basic linear regression toward        \u2502\n\u2502   transformer architectures. Three recurring themes:        \u2502\n\u2502   gradient descent intuition, attention mechanisms,         \u2502\n\u2502   and practical implementation in PyTorch...\"               \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nThe **AI Synthesis** at the bottom is the Collection's killer feature. It uses the collection's top ACUs as context and generates a paragraph describing what the user has actually learned across all the conversations in this collection. It updates when new conversations are added.\n\n**Sharing a Collection** creates a structured Knowledge Pulse package containing the Collection metadata, all conversation cards (without full message content), and the AI Synthesis. Recipients can browse the Collection's overview and request access to individual conversations.\n\n---\n\n## 13I \u2014 IMPORT MANAGEMENT\n\nThe Imported zone gets a dedicated management surface since this is one of VIVIM's primary value propositions.\n\n### Import Hub Layout\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Imported Conversations                         [+ Import]   \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  PROVIDERS                    IMPORT HISTORY                 \u2502\n\u2502                                                              \u2502\n\u2502  \u25cf ChatGPT     142   \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588                               \u2502\n\u2502  \u25cf Claude       67   \u2588\u2588\u2588\u2588                                   \u2502\n\u2502  \u25cf Gemini       23   \u2588\u2588                                     \u2502\n\u2502  \u25cf Grok          8   \u258c                                      \u2502\n\u2502  \u25cf Perplexity    4   \u258c                                      \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500                                          \u2502\n\u2502  Total          244                                         \u2502\n\u2502                               Today (3)  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502                               \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u2502\n\u2502                               \u2502 + Building a RAG pipe. \u2502    \u2502\n\u2502                               \u2502   ChatGPT \u00b7 2h ago     \u2502    \u2502\n\u2502                               \u2502   \u2705 ACUs extracted    \u2502    \u2502\n\u2502                               \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2502\n\u2502                               This week (12) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500     \u2502\n\u2502                               Last month (47) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500     \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Import Status States\n\nEvery imported conversation has a processing status that is visible in the Import Hub:\n\n| Status | Meaning | Visual |\n|---|---|---|\n| `capturing` | Playwright headless extraction in progress | Animated progress bar |\n| `processing` | ACU segmentation and embedding running | Spinning ACU icon |\n| `ready` | Fully indexed and searchable | Green checkmark |\n| `partial` | Extracted but embedding failed for some messages | Yellow warning with retry |\n| `failed` | Extraction failed entirely | Red with error details and retry |\n| `duplicate` | Same URL was previously imported | Grey with link to original |\n\n### Bulk Import\n\nFor users migrating from another platform, a **Bulk Import** flow accepts:\n- A folder of ChatGPT exported JSON files (from ChatGPT's own data export)\n- A folder of Claude conversation exports\n- A ZIP of custom JSON in VIVIM's documented schema\n- A CSV with columns: `title`, `provider`, `url`, `date`\n\nThe bulk import runs as a background job with progress shown in the Import Hub. Individual failures do not stop the entire batch.\n\n### Re-extraction\n\nIf VIVIM's extraction algorithm improves (new ACU scoring model, better segmentation), users can trigger **Re-extraction** on existing imported conversations \u2014 regenerating ACUs and embeddings with the latest pipeline. Available as a bulk action (\"Re-process all ChatGPT conversations\") or per-conversation.\n\n---\n\n## 13J \u2014 ANALYTICS DASHBOARD (WITHIN ARCHIVE)\n\nThe existing `/analytics` route gets elevated to a first-class section within the Archive context, not a standalone page.\n\n### Key Metrics Surface\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Your AI Usage                         Last 30 days \u25be       \u2502\n\u2502                                                             \u2502\n\u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   \u2502\n\u2502  \u2502  2.4M    \u2502  \u2502   244    \u2502  \u2502  1,847   \u2502  \u2502   4.2h   \u2502   \u2502\n\u2502  \u2502  tokens  \u2502  \u2502  chats   \u2502  \u2502   ACUs   \u2502  \u2502  avg/day \u2502   \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518   \u2502\n\u2502                                                             \u2502\n\u2502  PROVIDER BREAKDOWN         TOP TOPICS (by ACU frequency)   \u2502\n\u2502  ChatGPT  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588  58%     1. Machine Learning   \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588  \u2502\n\u2502  Claude   \u2588\u2588\u2588\u2588      27%     2. React/Frontend     \u2588\u2588\u2588\u2588\u2588\u2588    \u2502\n\u2502  Gemini   \u2588\u2588         9%     3. System Design      \u2588\u2588\u2588\u2588\u2588     \u2502\n\u2502  Other    \u258c          6%     4. Travel Planning    \u2588\u2588\u2588       \u2502\n\u2502                             5. Writing            \u2588\u2588        \u2502\n\u2502                                                             \u2502\n\u2502  USAGE OVER TIME                                            \u2502\n\u2502  [Sparkline chart \u2014 conversations per day, last 30 days]    \u2502\n\u2502                                                             \u2502\n\u2502  KNOWLEDGE GROWTH                                           \u2502\n\u2502  \"Your memory graph has grown by 143 ACUs this month.       \u2502\n\u2502   Your most explored new topic is attention mechanisms.\"    \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### What Analytics Unlocks for Discovery\n\nAnalytics is not just for reporting \u2014 it drives re-engagement:\n- \"You haven't talked about System Design in 3 weeks \u2014 your last 4 conversations about it are here\"\n- \"Your ChatGPT conversations have 40% higher quality ACUs than your Gemini ones \u2014 consider this when choosing a model\"\n- \"You've started 8 conversations about RAG but never finished exploring embedding dimensions \u2014 continue?\"\n\nThese surfaced in a \"Insights\" widget below the metrics, not as push notifications.\n\n---\n\n## 13K \u2014 COMPONENT ARCHITECTURE MAP\n\nNew components required for the Archive system, their file paths, and their dependencies:\n\n```\npwa/src/pages/Archive/\n\u251c\u2500\u2500 Archive.tsx                     # Shell \u2014 zone routing, layout manager\n\u251c\u2500\u2500 AllChats.tsx                    # Zone: full conversation list with all views\n\u251c\u2500\u2500 Imported.tsx                    # Zone: import hub + provider breakdown\n\u251c\u2500\u2500 Active.tsx                      # Zone: in-progress conversations\n\u251c\u2500\u2500 Shared.tsx                      # Zone: inbox + outbox\n\u2514\u2500\u2500 Collections.tsx                 # Zone: collection management\n\npwa/src/components/archive/\n\u251c\u2500\u2500 ConversationCard/\n\u2502   \u251c\u2500\u2500 ConversationCard.tsx        # Unified card \u2014 3 sizes via prop\n\u2502   \u251c\u2500\u2500 ConversationCard.types.ts   # CardSize, CardState types\n\u2502   \u2514\u2500\u2500 ConversationCardActions.tsx # Hover/long-press action bar\n\u251c\u2500\u2500 ViewModes/\n\u2502   \u251c\u2500\u2500 ListView.tsx                # Virtualized list\n\u2502   \u251c\u2500\u2500 GridView.tsx                # Responsive masonry grid\n\u2502   \u251c\u2500\u2500 CanvasView.tsx              # React Flow knowledge graph\n\u2502   \u2514\u2500\u2500 TimelineView.tsx            # Swimlane timeline\n\u251c\u2500\u2500 Search/\n\u2502   \u251c\u2500\u2500 ArchiveSearch.tsx           # Unified search input + results\n\u2502   \u251c\u2500\u2500 SearchFilters.tsx           # Collapsible filter panel\n\u2502   \u251c\u2500\u2500 SearchResults.tsx           # Tabbed: Conversations | ACU Matches\n\u2502   \u251c\u2500\u2500 AISummaryWidget.tsx         # AI synthesis of search results\n\u2502   \u2514\u2500\u2500 ACUResultCard.tsx           # Single ACU match result\n\u251c\u2500\u2500 Chat/\n\u2502   \u251c\u2500\u2500 ChatShell.tsx               # Three-panel layout manager\n\u2502   \u251c\u2500\u2500 ChatThread.tsx              # Message list (virtualized)\n\u2502   \u251c\u2500\u2500 ChatMessage.tsx             # Single message with all actions\n\u2502   \u251c\u2500\u2500 ChatInputBar.tsx            # Input + model selector + context tools\n\u2502   \u251c\u2500\u2500 ContextPanel.tsx            # Right panel: ContextVisualizer + pinned\n\u2502   \u251c\u2500\u2500 ModelSelector.tsx           # Provider/model dropdown (Radix)\n\u2502   \u2514\u2500\u2500 BranchTree.tsx             # Visual branch navigator\n\u251c\u2500\u2500 Import/\n\u2502   \u251c\u2500\u2500 ImportHub.tsx               # Provider breakdown + import history\n\u2502   \u251c\u2500\u2500 ImportStatusCard.tsx        # Per-import status tracker\n\u2502   \u2514\u2500\u2500 BulkImportFlow.tsx          # Multi-step bulk import wizard\n\u251c\u2500\u2500 Collections/\n\u2502   \u251c\u2500\u2500 CollectionCard.tsx          # Collection summary card\n\u2502   \u251c\u2500\u2500 CollectionDetail.tsx        # Full collection view\n\u2502   \u2514\u2500\u2500 AISynthesisWidget.tsx       # AI summary of collection\n\u2514\u2500\u2500 Analytics/\n    \u251c\u2500\u2500 AnalyticsDashboard.tsx      # Metrics overview\n    \u251c\u2500\u2500 ProviderBreakdown.tsx       # Provider usage chart\n    \u251c\u2500\u2500 TopicCloud.tsx              # Topic frequency visualization\n    \u2514\u2500\u2500 InsightsWidget.tsx          # AI-driven re-engagement prompts\n```\n\n### New Routes\n\n| Route | Component | Description |\n|---|---|---|\n| `/archive` | `Archive.tsx` | Archive shell \u2014 defaults to All Chats |\n| `/archive/imported` | `Imported.tsx` | Import hub |\n| `/archive/active` | `Active.tsx` | In-progress chats |\n| `/archive/shared` | `Shared.tsx` | Social inbox/outbox |\n| `/archive/collections` | `Collections.tsx` | Collection browser |\n| `/archive/collections/:id` | `CollectionDetail.tsx` | Single collection |\n| `/archive/search` | `ArchiveSearch.tsx` | Dedicated search results page |\n| `/chat` | `ChatShell.tsx` | Native chat (existing route, redesigned) |\n| `/chat/:id` | `ChatShell.tsx` | Specific conversation continued |\n\n### State Requirements\n\n**New Zustand store: `useArchiveStore`**\n\n```typescript\ninterface ArchiveStore {\n  // View state\n  activeZone: 'all' | 'imported' | 'active' | 'shared' | 'collections';\n  viewMode: 'list' | 'grid' | 'canvas' | 'timeline';\n  sortBy: 'lastActive' | 'createdAt' | 'tokenCount' | 'qualityScore';\n  filters: ArchiveFilters;\n\n  // Selection state (for bulk actions)\n  selectedIds: Set\u003cstring\u003e;\n  isSelecting: boolean;\n\n  // Search state\n  searchQuery: string;\n  searchMode: 'lexical' | 'semantic' | 'cross-conversation';\n  searchResults: SearchResults | null;\n\n  // Actions\n  setViewMode: (mode: ViewMode) =\u003e void;\n  setFilters: (filters: Partial\u003cArchiveFilters\u003e) =\u003e void;\n  toggleSelection: (id: string) =\u003e void;\n  clearSelection: () =\u003e void;\n  bulkArchive: (ids: string[]) =\u003e Promise\u003cvoid\u003e;\n  bulkAddToCollection: (ids: string[], collectionId: string) =\u003e Promise\u003cvoid\u003e;\n  bulkDelete: (ids: string[]) =\u003e Promise\u003cvoid\u003e;\n}\n```\n\n**Persistence:** `viewMode`, `sortBy`, and `activeZone` persist to IndexedDB via Dexie `settings` table. `filters` and `searchQuery` are session-only (reset on page close). `selectedIds` is never persisted.\n\n---\n\n## 13L \u2014 BULK ACTIONS\n\nWhen the user is in selection mode (triggered by long-pressing any card, or clicking a \"Select\" button in the toolbar), the toolbar transforms into a bulk action bar:\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  \u2190 Cancel  [14 selected]                                 \u2502\n\u2502  [Archive]  [Add to Collection]  [Export]  [Delete]  [+] \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n**Available bulk actions:**\n- Archive / Unarchive\n- Add to Collection (picker appears)\n- Remove from Collection (if inside a collection view)\n- Export as ZIP (Markdown + JSON for each selected conversation)\n- Create Collection from selection\n- Delete (requires confirmation, shows count of ACUs that will be removed)\n- Share as Bundle (creates a multi-conversation Knowledge Pulse)\n- Re-process ACUs (triggers re-extraction pipeline on selected conversations)\n\n---\n\n## 13M \u2014 EMPTY STATES AND ONBOARDING\n\nThe Archive empty state is a critical onboarding moment. It must convert new users rather than confuse them.\n\n### First-Time Empty State\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                                                        \u2502\n\u2502         \u2726                                             \u2502\n\u2502      Your Archive                                     \u2502\n\u2502      is waiting.                                      \u2502\n\u2502                                                        \u2502\n\u2502   Your AI conversations from ChatGPT, Claude,         \u2502\n\u2502   Gemini and others will live here \u2014 organized,        \u2502\n\u2502   searchable, and connected.                           \u2502\n\u2502                                                        \u2502\n\u2502   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510        \u2502\n\u2502   \u2502  \ud83d\udcce  Import from ChatGPT                 \u2502        \u2502\n\u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518        \u2502\n\u2502   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510        \u2502\n\u2502   \u2502  \u2726   Start a new AI chat                 \u2502        \u2502\n\u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518        \u2502\n\u2502   \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510        \u2502\n\u2502   \u2502  \u25b6   Load demo archive                   \u2502        \u2502\n\u2502   \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518        \u2502\n\u2502                                                        \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Provider-Specific Empty States\n\nWhen the Imported zone is filtered to a specific provider with no results:\n\u003e \"No ChatGPT conversations yet. Paste a conversation URL to import it, or export your full ChatGPT history and bulk-import it.\"\nWith direct links to ChatGPT's data export page and VIVIM's import guide.\n\n### Post-Import First State\n\nAfter first import (3\u201310 conversations), a contextual prompt appears:\n\u003e \"Great start. Your 7 ChatGPT conversations have been processed into 43 knowledge units. Want VIVIM to suggest how to organize them?\"\nThis triggers the AI-suggested Collections flow.\n\n---\n\n## 13N \u2014 DESIGN LANGUAGE FOR THE ARCHIVE\n\nThe Archive inherits the \"Neo-Glassmorphic Knowledge Hub\" design language from Document 10A but has its own specific constraints:\n\n### Density and Layout Rules\n- Card padding: `12px` internal, `8px` gap between cards in list mode, `16px` in grid mode\n- Sidebar width: `260px` fixed on desktop, collapses to `0` (content full-width) with a `48px` icon-only rail option\n- Content max-width: `1440px` at the shell level, `100%` within each zone\n- Typography scale in cards: title at `14px/500`, metadata at `12px/400`, muted at `11px/400`\n\n### Provider Color System Integration\nEvery conversation card uses the provider accent system (from Document 3E) as a `3px left border` in list mode and a `3px top border` in grid mode. This is the only provider color applied \u2014 no full backgrounds. This is consistent across light and dark mode because border colors are defined as CSS variables with proper dark-mode values.\n\n### The Chat Interface Aesthetic\nThe chat thread deliberately mirrors the quality of Claude.ai and ChatGPT \u2014 clean, focused, generous whitespace between messages. The difference is VIVIM's context panel on the right, which introduces the system's unique visual identity: the layered token visualization with its color-coded layer bars.\n\nUser messages: right-aligned pill with `bg-brand-primary/10` tint, no heavy border.\nAI messages: left-aligned, no background \u2014 the text floats. Provider icon appears top-left of each AI message.\nCode blocks: dark surface regardless of theme, full-width, with language badge and copy button.\n\n### Motion Principles Specific to Archive\n- Card entrance: `fadeSlideUp` with 40ms stagger between cards (same as current, but with `prefers-reduced-motion` fallback)\n- View mode switch: cards scale down to `0.95` and fade, new mode fades in. Duration: `200ms` ease-out.\n- Canvas view: nodes animate in with a `spring(stiffness: 120, damping: 14)` from center. Edges draw in after nodes settle.\n- Search results: instant lexical results appear immediately. Semantic results fade in above them when ready. AI summary fades in last.\n- Panel transitions (context panel collapse/expand): `width` animation with `200ms` ease-in-out, content fades simultaneously.\n\n---\n\n## 13O \u2014 DETAILED IMPLEMENTATION TASKS \u0026 STEPS\n\nBased on an analysis of the current VIVIM App source codebase architecture (React, Zustand, React-Router-DOM, Tailwind), the following is the phased, rigorous approach required to fully implement the Archive gracefully without breaking current features.\n\n### Phase 1: Architecture \u0026 State Foundation\n**Goal:** Establish the underlying data and state layer for the Archive.\n1. **Zustand State (`pwa/src/stores/archive.store.ts`):** \n   - Create the `useArchiveStore` containing state for `activeZone`, `viewMode`, `sortBy`, `filters`, `searchQuery`, and `selectedIds`.\n   - Incorporate `persist` middleware configured appropriately to save `viewMode`, `sortBy`, and `activeZone` to IndexedDB or localStorage, ensuring `searchQuery` and `selectedIds` remain session-only.\n2. **IndexedDB (Dexie) Schema Update:** \n   - Ensure the `db` schema defines indexes for `conversations` on properties like `provider`, `createdAt`, `totalTokens`, `status`, and `tags`.\n   - Ensure `ACU` collections have proper indexes for search matching and temporal queries.\n3. **Route Wiring (`pwa/src/router/routes.tsx`):**\n   - Add new lazy-loaded routes inside `AppLayout` wrapped with `AuthGuard`:\n     - `/archive` mapped to `Archive` shell component.\n     - `/archive/imported`, `/archive/active`, `/archive/shared`, `/archive/collections`, `/archive/search` mapped to their respective zone components.\n     - `/archive/collections/:id` mapped to `CollectionDetail`.\n\n### Phase 2: Shell UI \u0026 Navigation Base\n**Goal:** Create the Archive frame and wire global navigations.\n1. **Archive Component Shell (`pwa/src/pages/Archive/Archive.tsx`):** \n   - Implement the primary responsive shell structure, consisting of the Top/Search Bar, Secondary Zone Navigation Tabs (All, Imported, Active, Shared, Collections), and the main variable content area. \n2. **Global Navigation Integration:** \n   - Update `pwa/src/components/layout/SideNav.tsx` to include an \"Archive\" top-level link. \n   - Update `pwa/src/components/ios/IOSBottomNav.tsx` to ensure Mobile mapping includes the Archive tab.\n3. **Layout Wrappers (`pwa/src/components/archive/`):**\n   - Implement `ArchiveHeader` with embedded quick-search and View toggle (List, Grid, Canvas, Timeline).\n\n### Phase 3: Core Conversation Views \u0026 Cards\n**Goal:** Build the dense, visually excellent conversation displays.\n1. **The Conversation Card Component (`ConversationCard.tsx`):**\n   - Build a highly modular card that supports the 3 sizes: `compact` (list view), `standard` (grid masonry), and `expanded` (detail slide-in).\n   - Inject the provider accent color using `var(--provider-accent)` for the 3px top border (grid) or left edge (list).\n   - Implement the `ConversationCardActions.tsx` overlay that reveals Continue, Share, Archive, and Collection Add on hover/long-press.\n2. **List View (`pwa/src/components/archive/ViewModes/ListView.tsx`):**\n   - Use `@tanstack/react-virtual` or similar to handle virtualization of compact cards for high performance on 1000+ chats.\n3. **Grid View (`pwa/src/components/archive/ViewModes/GridView.tsx`):**\n   - Use CSS Grid/Masonry to dynamically fit 2-4 columns based on the window size breakpoint and Sidebar open state.\n\n### Phase 4: Search \u0026 Discovery Engine\n**Goal:** Make everything instantly findable lexically and semantically.\n1. **Search Input \u0026 State (`ArchiveSearch.tsx`):**\n   - Hook into the `useArchiveStore` search query state. On input change, trigger Debounced Dexie lexical queries.\n2. **Semantic Search Integration:**\n   - Call the backend semantic search endpoint passing the query for ACU matches.\n   - Render results in a split view: `SearchResults.tsx` housing `ACUResultCard.tsx` mapped for each matched interaction.\n3. **Filter Panel (`SearchFilters.tsx`):**\n   - Build a collapsible UI alongside or below the search bar to house multi-selects for Provider, Date, Tags, and Token count sliders. Hook these directly into the local Dexie `.filter()` chains.\n4. **AI Summary Synthesis (`AISummaryWidget.tsx`):** \n   - Create a component that receives the top 10 ACU matches and streams a synthesis query to the LLM backend summarizing the insights.\n\n### Phase 5: Native AI Chat Redesign \u0026 Context Panel\n**Goal:** Bring the core chat experience up to SOTA levels and integrate the visualizer.\n1. **Three-Panel Layout (`pwa/src/components/archive/Chat/ChatShell.tsx`):**\n   - Re-architect the `/chat` route. The layout consists of: a collapsible Archive Sidebar, the Main Thread, and the Collapsible Right Context Panel.\n2. **Context Visualizer Redeploy (`ContextVisualizer.tsx`):** \n   - Extract the existing ContextCockpit or modal Visualizer and lodge it into the right panel. Make it collapsible into a colored dot strip rail.\n3. **Input Bar Enhancements (`ChatInputBar.tsx`):** \n   - Implement an auto-resizing textarea.\n   - Add a `ModelSelector.tsx` dropdown integrated with the user's available models and limits.\n   - Attach Archive Context button that spawns a search dialog to \"Pin\" existing conversations to the current chat prompt.\n4. **Message Actions (`ChatMessage.tsx`):** \n   - Ensure every message has: Copy text, Copy Code Block, Regenerate, Highlight to Create ACU, and \"Branch from here\".\n\n### Phase 6: Advanced Layouts \u0026 Interactions\n**Goal:** Implement the \"Wow-factor\" views like the Canvas Graph.\n1. **Canvas View (`CanvasView.tsx`):** \n   - Install `@xyflow/react` if not present. Map conversations and their semantic similarity to Nodes and Edges. Use provider accent coloring for nodes. Implement drag/zoom interactions. \n2. **Timeline View (`TimelineView.tsx`):** \n   - Build horizontal swimlanes utilizing D3 or standard SVG charts grouping conversations horizontally by time buckets.\n3. **Bulk Action Mechanics:** \n   - Implement `selectedIds` multi-select pattern. When `selectedIds.size \u003e 0`, transform the Main Header into the Bulk Actions toolbar allowing for bulk Archive, add-to-collection, or Export.\n\n### Phase 7: Specific Zones (Imported \u0026 Shared)\n**Goal:** Bring the ingestion and distribution layers into the Archive.\n1. **Import Hub (`ImportHub.tsx`):**\n   - List background processing status cards using the socket or poll for provider scrapes (via Playwright or local imports).\n   - Display a visual Provider Breakdown chart.\n2. **Shared Zone (`Shared.tsx`):**\n   - Two-pane UI connecting to the existing Knowledge Pulse delivery mechanisms. Show `Outbox` with view/absorb metrics and `Inbox` with context hand-off verification flows.\n\n### Phase 8: Collections \u0026 Integration\n**Goal:** Introduce Collections and synthesize analytics within the Archive.\n1. **Collections (`Collections.tsx` \u0026 `CollectionDetail.tsx`):**\n   - Read/write Collections entity models to local db. \n   - Provide an \"Add to Collection\" picker context menu.\n   - In Detail view, implement the `AISynthesisWidget.tsx` configured to summarize the collection's combined ACUs.\n2. **Analytics Repositioning:**\n   - Migrate components from `pwa/src/pages/Analytics.tsx` into an inner view `pwa/src/components/archive/Analytics/AnalyticsDashboard.tsx` surfaced natively inside the Archive navigation frame. Provide direct actionable re-engagement recommendations based on the analytics values.\n\n*Note: All tasks must adhere to `prefers-reduced-motion` considerations, strict glassmorphism/tailwind SOTA principles defined in 13N, and heavily utilize localized Dexie querying to ensure the UI feels instant (\u003c50ms response).*", "source": "my_files", "start_idx": 71, "type": "file"}], "default_model_slug": "auto", "finish_details": {"stop_tokens": [200002], "type": "stop"}, "is_complete": true, "message_type": "next", "model_slug": "gpt-5-2", "parent_id": "5299db1d-7be3-4fca-967d-92105ffcc135", "request_id": "e6d13cb9-85de-462a-ad0e-4aa671036698", "resolved_model_slug": "gpt-5-2", "search_result_groups": [], "token_count": 258, "turn_exchange_id": "87ac6d78-9024-44d6-8e4e-9bc42aeb5d0f"}, "recipient": "all", "status": "finished_successfully", "update_time": null, "weight": 1.0}, "parent": "5299db1d-7be3-4fca-967d-92105ffcc135"}, "5299db1d-7be3-4fca-967d-92105ffcc135": {"children": ["48bc7053-b789-47bc-bfc0-46cc2704e25d"], "id": "5299db1d-7be3-4fca-967d-92105ffcc135", "message": {"author": {"metadata": {}, "name": "file_search", "role": "tool"}, "channel": null, "content": {"content_type": "text", "parts": ["All the files uploaded by the user have been fully loaded. Searching won't provide additional information."]}, "create_time": 1772692054.8660822, "end_turn": null, "id": "5299db1d-7be3-4fca-967d-92105ffcc135", "metadata": {"can_save": false, "default_model_slug": "auto", "is_visually_hidden_from_conversation": m_message": true, "request_id": "e6d13cb9-85de-462a-ad0e-4aa671036698", "turn_exchange_id": "87ac6d78-9024-44d6-8e4e-9bc42aeb5d0f"}, "recipient": "all", "status": "finished_successfully", "update_time": null, "weight": 0.0}, "parent": "106049d7-8e73-475f-92fc-f76ee9bf6b84"}}, "memory_scope": "global_enabled", "moderation_results": [], "owner": null, "pinned_time": null, "plugin_ids": null, "safe_urls": ["https://www.openai.com"], "sugar_item_id": null, "sugar_item_visible": false, "title": "Hello and Assistance", "update_time": 1772692066.311057, "voice": null}, {"async_status": 4, "atlas_mode_enabled": null, "blocked_urls": [], "context_scopes": null, "conversation_id": "69a922ae-4abc-8330-bfb8-a32dabbac390", "conversation_origin": null, "conversation_template_id": "g-p-69a922611f98819181514c2d9d1492ea", "create_time": 1772692146.876323, "current_node": "4042cc71-8419-4aa9-a034-1b91f8b08cfe", "default_model_slug": "auto", "disabled_tool_ids": [], "gizmo_id": "g-p-69a922611f98819181514c2d9d1492ea", "gizmo_type": "snorlax", "id": "69a922ae-4abc-8330-bfb8-a32dabbac390", "is_archived": false, "is_do_not_remember": false, "is_read_only": null, "is_starred": null, "is_study_mode": false, "mapping": {"0482fd2c-ef33-454d-8878-e8b84b536440": {"children": ["5c60f2dc-2aa7-4d83-983c-0b5f06634ae1"], "id": "0482fd2c-ef33-454d-8878-e8b84b536440", "message": {"author": {"metadata": {}, "name": null, "role": "user"}, "channel": null, "content": {"content_type": "text", "parts": ["tell me about this project"]}, "create_time": 1772692145.761, "end_turn": null, "id": "0482fd2c-ef33-454d-8878-e8b84b536440", "metadata": {"can_save": false, "message_source": null, "request_id": "34694504-e6ae-4ca1-9331-91e8d3a17721", "resolved_model_slug": "gpt-5-2", "selected_github_repos": [], "serialization_metadata": {"custom_symbol_offsets": []}, "turn_exchange_id": "a3e50347-edd8-4f47-b386-10acf8426ada"}, "recipient": "all", "status": "finished_successfully", "update_time": null, "weight": 1.0}, "parent": "cacb8017-fb6d-43b9-8861-bd0befd80a58"}, "4042cc71-8419-4aa9-a034-1b91f8b08cfe": {"children": [], "id": "4042cc71-8419-4aa9-a034-1b91f8b08cfe", "message": {"author": {"metadata": {}, "name": null, "role": "assistant"}, "channel": "final", "content": {"content_type": "text", "parts": ["Here\u2019s a high-level breakdown of the **VIVIM project** based on the full Deep Extraction blueprint \ue200filecite\ue202turn0file0\ue201.\n\n---\n\n# \ud83e\udde0 VIVIM \u2014 Project Overview\n\n## What VIVIM Is\n\nVIVIM is a **local-first, AI conversation capture + intelligence platform**.\n\nIt acts as a:\n- \ud83d\udcda Personal AI conversation library  \n- \ud83d\udd0d Searchable knowledge base  \n- \ud83e\udde9 Context-aware AI workspace  \n- \ud83c\udf10 Offline-capable, CRDT-synced system  \n- \ud83d\udee1\ufe0f Sovereign data architecture (user-owned data)\n\nIt\u2019s structured as:\n\n- **PWA Frontend (React + Zustand + Dexie + TanStack Query)**\n- **Node/Express Backend (Prisma + Postgres + Socket.io)**\n- **CRDT-based sync layer**\n- **Admin system + network telemetry**\n- **AI context engine (\u201cGlass Box Inspector\u201d)**\n\n---\n\n# \ud83c\udfd7\ufe0f Architecture Summary\n\n## 1\ufe0f\u20e3 Frontend (PWA)\n\nTech stack:\n- React + Vite\n- Zustand for global state\n- Dexie (IndexedDB) for offline storage\n- TanStack Query for API data\n- Radix UI primitives\n- Tailwind + custom CSS\n- Framer Motion animations\n- Prism + KaTeX + Mermaid rendering\n\n### Core Frontend Systems\n\n| System | Purpose |\n|--------|----------|\n| Conversation Feed | Library of captured AI chats |\n| AIChat | Native AI interface |\n| ContentRenderer | Markdown, code, math, diagrams |\n| ContextVisualizer | Token allocation transparency |\n| SyncIndicator | Real-time network/sync state |\n| Capture Page | Import conversations from providers |\n\nThe UI is currently **mobile-first**, but desktop is under-optimized (bottom nav stretched instead of sidebar).\n\n---\n\n## 2\ufe0f\u20e3 Backend (Node + Prisma)\n\nThe backend exposes:\n\n- `/api/v1/*` \u2014 main app endpoints  \n- `/api/admin/*` \u2014 admin + introspection endpoints  \n- Socket.io for real-time sync  \n\nIt manages:\n- Conversations\n- Messages\n- Sync queue\n- CRDT resolution\n- Admin telemetry\n- Health checks\n\n---\n\n# \ud83d\udd01 The Core Philosophy\n\nVIVIM is designed around:\n\n### \ud83e\udde0 \u201cDigital Brain\u201d Concept\nUsers collect AI conversations and:\n- Search them\n- Continue them\n- Inspect context budgets\n- Analyze token usage\n- Visualize knowledge\n\n### \ud83c\udf10 Local-First Architecture\n- IndexedDB stores everything locally\n- SyncQueue buffers offline mutations\n- Server is supposed to reconcile changes\n- CRDT model planned for conflict resolution\n\n### \ud83d\udd0e Transparent AI (Glass Box)\nThe **ContextVisualizer** shows how tokens are distributed across 8 layers (L0\u2013L7), making AI context non-magical.\n\n---\n\n# \u26a0\ufe0f Critical Problems Identified\n\nThe blueprint highlights serious architectural gaps.\n\n## \ud83d\udea8 CRITICAL ISSUE: Sync Engine Drops Data\n\nIn `socket.ts`, the server:\n\n```ts\nhandleSyncPush(socket, { changes }) {\n  // TODO: Implement write-back logic\n  socket.emit('sync:ack', { status: 'processed' });\n}\n```\n\nImpact:\n- Client sends data\n- Server logs it\n- Nothing is saved\n- User believes sync succeeded\n\nThis completely breaks:\n- Offline-first promise\n- Data durability\n- Trust model\n\n---\n\n## \ud83d\udea8 SECURITY RISK: SQL Injection in Admin\n\nEndpoint:\n```\nPOST /api/admin/database/query\n```\n\nUses:\n```js\nprisma.$queryRawUnsafe(query)\n```\n\nWith only a weak `startsWith(\"SELECT\")` check.\n\nThis allows:\n```\nSELECT 1; DROP TABLE users;\n```\n\nHigh risk.\n\n---\n\n# \ud83c\udfa8 Design System Status\n\nCurrent design:\n- Indigo/Violet primary system\n- Light-first\n- Hardcoded provider gradients\n- Pixel-based spacing in places\n- Mixed typography definitions\n- No reduced-motion support\n\nProposed 2026 direction:\n- Dark-first OLED\n- Neo-glassmorphic surfaces\n- CSS variable token system\n- Provider gradients as semantic tokens\n- Geist + Geist Mono typography\n- Desktop sidebar architecture\n\n---\n\n# \ud83d\udce6 Data Model\n\nIndexedDB (Dexie):\n- conversations\n- messages\n- settings\n- syncQueue\n\nZustand Stores:\n- useAppStore (identity, network, AI, sovereignty)\n- useHomeUIStore (UI filters)\n\nServer DB:\n- Prisma models (Conversation, Message, etc.)\n\n---\n\n# \ud83d\udcf1 Mobile Readiness\n\nStrengths:\n- Virtualized feed (TanStack Virtual)\n- Safe-area handling for BottomNav\n- IndexedDB offline support\n\nGaps:\n- FAB overlaps bottom content\n- Hardcoded height estimates break virtualization\n- No swipe gestures\n- Desktop just stretches mobile layout\n\n---\n\n# \ud83e\udde9 Roadmap Priorities\n\n## \ud83d\udd34 Foundation Tier\n\n1. Fix real sync persistence\n2. Remove SQL injection risk\n3. Implement admin telemetry properly\n4. Wire export/import for GDPR compliance\n\n## \ud83d\udfe1 Experience Tier\n\n1. Desktop navigation redesign (sidebar)\n2. Provider tokenization\n3. Glassmorphic redesign\n4. Animation improvements\n\n---\n\n# \ud83e\uddec What Makes VIVIM Unique\n\nMost AI tools:\n- Are cloud-only\n- Hide context logic\n- Don\u2019t let users own data\n\nVIVIM:\n- Is local-first\n- Aims for user sovereignty\n- Exposes token budget visually\n- Supports multiple providers\n- Treats AI chats as long-term knowledge assets\n\nIt\u2019s closer to:\n- Obsidian for AI conversations  \n- A CRDT-powered AI notebook  \n- A \u201cknowledge chain\u201d interface  \n\nBut with AI-native tooling baked in.\n\n---\n\n# \ud83d\udcca Project Maturity Assessment\n\n| Area | Status |\n|------|--------|\n| UI Foundation | 70% |\n| Offline Architecture | 60% |\n| Sync Reliability | \u274c Broken |\n| Admin System | 40% |\n| Security Posture | \u26a0\ufe0f Needs hardening |\n| Design System | Mid-transition |\n| Product Vision | Very strong |\n\n---\n\n# \ud83e\udde0 In One Sentence\n\n**VIVIM is a local-first, sovereign AI conversation operating system \u2014 architecturally ambitious, design-forward, but currently blocked by critical sync and security gaps.**\n\n---\n\nIf you\u2019d like, I can next:\n- Break this down into a technical investor brief\n- Turn it into a product strategy memo\n- Map it into a phased execution plan\n- Or assess whether the architecture should be simplified before scaling"]}, "create_time": 1772692148.145503, "end_turn": true, "id": "4042cc71-8419-4aa9-a034-1b91f8b08cfe", "metadata": {"can_save": true, "citations": [{"citation_format_type": "berry_file_search", "end_ix": 120, "metadata": {"extra": {"authors_display": null, "cited_message_id": "95dddba8-49a2-4b55-93af-ccd5f39e3b5c", "cited_message_idx": 6, "cloud_doc_url": null, "doi": null, "effective_time": null, "journal_homepage_url": null, "journal_name": null, "line_range": null, "publication_year": "None", "retrieval_file_index": 0, "retrieval_turn": 0, "run_id": null, "search_result_idx": null, "set_id": null, "spl_version": null, "title": null}, "id": "file_00000000e3c4720a8d6f5e96289008bd", "name": "VIVIM_DEEP_EXTRACTION.md", "source": "my_files", "text": "\ue200filecite\ue202turn0file0\ue201\n\n# VIVIM Deep Extraction \u0026 Modernization Blueprint\r\n\r\n## DOCUMENT 1 \u2014 COMPONENT ANATOMY MAP\r\n\r\n### 1A. Component Inventory\r\n\r\n| Component Name | File Path | Props | Variants / States | Mobile Behavior | Desktop Behavior | Dark Mode | A11y Status | Known Bugs |\r\n|---|---|---|---|---|---|---|---|---|\r\n| `Button` | `pwa/src/components/ui/button.tsx` | `variant`, `size`, `asChild` | default, destructive, outline, secondary, ghost, link | Full width | Auto width | Yes | Focus states visible | None |\r\n| `Badge` | `pwa/src/components/ui/badge.tsx` | `variant` | default, secondary, destructive, outline | Inline flex | Inline flex | Yes | Basic | None |\r\n| `Card` | `pwa/src/components/ui/card.tsx` | Standard HTML div props | default | Stacked | Grid/Stack | Yes | None specific | None |\r\n| `Accordion` | `pwa/src/components/ui/accordion.tsx` | Radix primitive props | default | Stacked | Stacked | Yes | Radix A11y | None |\r\n| `DropdownMenu` | `pwa/src/components/ui/dropdown-menu.tsx` | Radix primitive props | default | Bottom sheet fallback missing | Dropdown | Yes | Radix A11y | None |\r\n| `Table` | `pwa/src/components/ui/table.tsx` | Standard HTML table props | default | Overflow-x auto | Full width | Yes | Basic | None |\r\n| `Tooltip` | `pwa/src/components/ui/tooltip.tsx` | Radix primitive props | default | Tap to show | Hover to show | Yes | Radix A11y | None |\r\n| `ResponsiveLayout` | `pwa/src/components/unified/ResponsiveLayout.tsx`| `maxWidth`, `padding` | default | Uses mobile classes | Uses desktop classes | Yes | N/A | None |\r\n| `Input` | `pwa/src/components/unified/Input.tsx` | `label`, `error`, `icon` | default, error | Full width | Auto/Full width | Yes | ARIA describedby | None |\r\n\r\n### 1B. Component Deep-Dives\r\n\r\n#### `ConversationCard` \u0026 `FeedItemCard` (in `Home.tsx`)\r\n**What it renders and why:** \r\nThis component serves as the primary visual representation of a captured AI conversation in the user's library. It renders the provider icon, timestamps, a preview snippet, tags, and mini-stats (message count, word count, code blocks). \r\n**Data Expectations:** \r\nExpects a `Conversation` object and multiple callback props for actions (`onContinue`, `onShare`, `onPinToggle`, `onArchiveToggle`, `onDelete`). \r\n**Current Gaps:** \r\nThe CSS class `.is-archived` applies a global `opacity: 0.6` to the entire card, meaning action buttons become faded and difficult to interact with. Keyboard navigation relies strictly on `e.key === 'Enter'`, completely missing `Space` key support for activation. Model name extraction attempts to use `convo.model || convo.metadata?.model` but fails if the shape changes.\r\n**2026 Standard Needs:** \r\nNeeds localized opacity (only dimming the content, not the actions). Must implement comprehensive ARIA labels (e.g., `\u003cspan className=\"sr-only\"\u003eMessages:\u003c/span\u003e` for the stats pills). Needs to migrate away from hardcoded gradients in `Home.css` to semantic CSS variables.\r\n\r\n#### `ContentRenderer` (`pwa/src/components/content/ContentRenderer.tsx`)\r\n**What it renders and why:** \r\nThe unified engine for rendering all chat blocks, supporting Markdown, Code (via Prism), Math (KaTeX), Mermaid diagrams, and custom ACU tool/result calls. It is heavily modularized.\r\n**Data Expectations:** \r\nTakes a `ContentBlock[]` or `ContentPart[]` array, iterating over types like `text`, `code`, `mermaid`, `image`, etc.\r\n**Current Gaps:** \r\nMermaid and KaTeX are dynamically imported, which is good for bundle size, but error states for these specific lazy-loads fall back silently or with generic UI. The `UnknownPart` fallback uses basic dashed borders. Admonitions (`:::note`) are parsed via custom remark directives but rely on strict regex matching for colors. \r\n**2026 Standard Needs:** \r\nNeeds seamless suspense boundaries for lazy-loaded renderers, ensuring no layout shift when a large Mermaid diagram initializes. Should adopt a unified `copy` interaction model (currently `TextPart` and `CodePart` duplicate copy logic).\r\n\r\n#### `ContextVisualizer` (`pwa/src/components/ContextVisualizer.tsx`)\r\n**What it renders and why:** \r\nRenders the \"Glass Box Inspector\" to show users exactly how the token budget was allocated across the 8 Context Layers (L0 to L7). \r\n**Data Expectations:** \r\nExpects `contextAllocation` (a record of `LayerBudget` items), `totalTokensAvailable`, and `ContextMetadata`. \r\n**Current Gaps:** \r\nColors are hardcoded in the component (`LAYER_COLORS = { 'L0_identity': '#8b5cf6', ... }`), bypassing the Tailwind configuration and preventing robust theming. The dropdown for XAI Attribution uses an inline SVG instead of the unified `lucide-react` icon set.\r\n**2026 Standard Needs:** \r\nMigrate hardcoded colors to CSS variables tied to the design system (e.g., `var(--layer-0)`). Implement smooth height transitions using `framer-motion` `AnimatePresence` for the expansion panel rather than relying on conditional rendering that causes layout snapping.\r\n\r\n#### `SyncIndicator` (`pwa/src/components/SyncIndicator.css/tsx`)\r\n**What it renders and why:** \r\nDisplays real-time network and CRDT sync status (Online, Syncing, Offline, Pending operations, Conflicts).\r\n**Data Expectations:** \r\nPulls directly from Zustand global state (`useAppStore(state =\u003e state.network)`).\r\n**Current Gaps:** \r\nUses hardcoded emoji strings (`'\ud83d\udce1'`, `'\ud83d\udd04'`, `'\u26a0\ufe0f'`) instead of proper SVGs/icons. The manual sync click handler (`handleManualSync`) is completely stubbed out with `// Chain client handles GossipSub sync automatically` but the button remains clickable and gives false feedback.\r\n**2026 Standard Needs:** \r\nReplace emojis with animated Lucide icons. Implement the actual trigger for a forced manual GossipSub sync, or disable/remove the button if the architecture dictates entirely passive background syncing.\r\n\r\n#### `ErrorState` (`pwa/src/components/ios/ErrorState.tsx`)\r\n**What it renders and why:** \r\nDisplays network, server, permission, and not-found error fallbacks.\r\n**Data Expectations:** \r\nExpects an `IOSErrorType` enum and optional action callbacks.\r\n**Current Gaps:** \r\nFully functional but visually disconnected from the \"unified\" design system (lives in the `ios/` folder). Hardcodes generic Tailwind colors (`bg-orange-50 dark:bg-orange-900/20`) rather than semantic error tokens. \r\n**2026 Standard Needs:** \r\nNeeds to be moved to the `unified` component directory. Should utilize standard design tokens (`var(--color-error-50)`). \r\n\r\n#### `AIChat` (`pwa/src/components/AIChat.tsx`)\r\n**What it renders and why:** \r\nThe primary interface for having conversations directly with the AI within VIVIM. Features a model selector, context visualizer injection, and streaming message rendering.\r\n**Data Expectations:** \r\nPulls from `useAIChat` hook and `useAIStore`. \r\n**Current Gaps:** \r\nThe model selector dropdown logic (`setShowModelSelector(false)`) uses a simple global `mousedown` listener that doesn't account for touch events reliably. `activeModels` extraction logic relies on `AIProviderCapabilities` casting to `any`.\r\n**2026 Standard Needs:** \r\nShould utilize Radix UI's DropdownMenu primitive to guarantee accessibility, focus trapping, and reliable outside-click detection across touch and mouse events.\r\n\r\n---\r\n\r\n## DOCUMENT 2 \u2014 PAGE-BY-PAGE LAYOUT SPECIFICATION\r\n\r\n*(Note: Due to exhaustive length constraints, prioritizing core architectural pages based on the files provided and referenced)*\r\n\r\n### Page: Home \u2014 Route: `/`\r\n\r\nPURPOSE: The primary feed and dashboard for viewing, organizing, and interacting with captured conversations.\r\n\r\nLAYOUT STRUCTURE (current):\r\n  Mobile (\u003c768px): Stacked vertical layout. Sticky header with search. Stats banner overflows horizontally. Bottom padding of `88px` applied for `BottomNav` clearance. Floating Action Button (FAB) at bottom right.\r\n  Tablet (768\u20131024px): 2-column grid when in grid mode, bounded width (`max-w-[800px]`). \r\n  Desktop (\u003e1024px): Same as tablet, centered column to prevent extreme line-lengths.\r\n\r\nDATA DEPENDENCIES:\r\n  - Zustand stores consumed: `useAIChat`, `useHomeUIStore` (`filterTab`, `viewMode`, `searchQuery`, `sortBy`).\r\n  - API endpoints called: `apiClient.get('/conversations')`.\r\n  - IndexedDB: `conversationService.getAllConversations()`, `unifiedRepository.getStats()`.\r\n\r\nINTERACTIVE ELEMENTS:\r\n  - Search input box.\r\n  - Sort dropdown (native `\u003cselect\u003e` visually hidden behind a button).\r\n  - View mode toggles (List, Grid, Graph).\r\n  - Filter tabs (All, Recent, Pinned, Archived).\r\n  - FAB (Main toggle, expands to Capture, AI Chat, Refresh).\r\n  - FeedItemCards (Click to route, swipe logic intended but not implemented).\r\n\r\nCURRENT MOBILE ISSUES:\r\n  - The Stats banner (`.home-stats-banner`) is scrollable but has `scrollbar-width: none` without any visual gradient or hint indicating there is off-screen content.\r\n  - The FAB blocks the bottom right content of the last card due to Z-index and position overlap.\r\n\r\nCURRENT DESKTOP ISSUES:\r\n  - Grid mode stretches cards awkwardly on ultra-wide screens because it caps at 2 columns regardless of monitor width.\r\n  - The native `\u003cselect\u003e` overlay approach for the Sort button feels broken on macOS desktop Safari/Chrome, as the native dropdown spawns out of alignment.\r\n\r\nRESPONSIVE GAPS:\r\n  - In `Home.tsx` the `virtualizer.estimateSize` hardcodes pixel heights (180 for grid, 140 for list). This breaks completely when mobile text wrapping pushes a card to 160px or desktop pushes it to 120px. \r\n\r\nEMPTY STATES:\r\n  - Exists. Shows a hero graphic with `MessageSquare` orb, and provides two buttons: \"Capture First Conversation\" and \"Load Demo Data\".\r\n\r\nLOADING STATES:\r\n  - Uses `IOSSkeletonList` count=6.\r\n  - Infinite scroll uses an intersection observer div with `h-8 w-full`.\r\n\r\nERROR STATES:\r\n  - Renders inline block with `WifiOff` icon and a \"Retry\" button connected to `loadConversations`.\r\n\r\n---\r\n\r\n### Page: Capture \u2014 Route: `/capture`\r\n*(Inferred from routes and common components)*\r\n\r\nPURPOSE: Interface to input URLs from third-party AI platforms for parsing and extraction.\r\n\r\nLAYOUT STRUCTURE (current):\r\n  Mobile (\u003c768px): Single column, large URL input field, provider toggles stacked.\r\n  Tablet/Desktop (\u003e768px): Centered single column, max-width bounded.\r\n\r\nDATA DEPENDENCIES:\r\n  - API endpoints called: `POST /api/v1/capture`.\r\n\r\nINTERACTIVE ELEMENTS:\r\n  - URL Text Input.\r\n  - Paste clipboard button.\r\n  - Provider selection chips.\r\n  - Submit/Capture button.\r\n\r\nCURRENT MOBILE ISSUES:\r\n  - Virtual keyboard often pushes the submit button out of viewport if sticky positioning is incorrect.\r\n\r\nEMPTY STATES:\r\n  - N/A (form is empty by default).\r\n\r\nLOADING STATES:\r\n  - Spinner on the submit button.\r\n\r\nERROR STATES:\r\n  - Likely uses inline `IOSErrorCard` or toast notification for \"Unsupported Provider\" / \"Timeout\".\r\n\r\n---\r\n\r\n## DOCUMENT 3 \u2014 DESIGN TOKEN EXTRACTION\r\n\r\n### 3A \u2014 Color Audit\r\n**From `tailwind.config.js` and CSS files:**\r\n- `--primary-500`: `#6366f1` (Indigo)\r\n- `--accent-500`: `#8b5cf6` (Violet)\r\n- `--bg-primary`: `#FAFAFA`\r\n- `--bg-secondary`: `#FFFFFF`\r\n- `--text-primary`: `#111827`\r\n- `--text-secondary`: `#4B5563`\r\n- `--success-500`: `#10b981`\r\n- `--error-500`: `#ef4444`\r\n\r\n**Hardcoded Colors in `Home.css` (GAPS):**\r\n- ChatGPT Gradient: `linear-gradient(90deg, #10b981, #059669)` \u2014 NO DARK MODE VARIANT.\r\n- Claude Gradient: `linear-gradient(90deg, #f97316, #ea580c)` \u2014 NO DARK MODE VARIANT.\r\n- Gemini Gradient: `linear-gradient(90deg, #3b82f6, #1d4ed8)` \u2014 NO DARK MODE VARIANT.\r\n- Grok Gradient: `linear-gradient(90deg, #ef4444, #b91c1c)` \u2014 NO DARK MODE VARIANT.\r\n\r\n**Hardcoded Colors in `ContextVisualizer.tsx`:**\r\n- `#8b5cf6`, `#6366f1`, `#0ea5e9`, `#10b981`, `#f59e0b`, `#ef4444`, `#ec4899`, `#14b8a6`.\r\n\r\n### 3B \u2014 Typography Audit\r\n- `font-sans`: `Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`\r\n- `font-mono`: `Fira Code, SF Mono, Consolas, monospace`\r\n- `ContentRenderer.tsx` hardcodes: `fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace'` for Mermaid and Prism syntax highlighting. (Inconsistency with Tailwind config).\r\n\r\n### 3C \u2014 Spacing \u0026 Sizing Audit\r\n- `Home.css` uses specific `px` values instead of Tailwind REM spacing:\r\n  - `bottom: 76px` (FAB area)\r\n  - `width: 50px; height: 50px;` (FAB main)\r\n  - `padding: 10px 16px;` (Stats banner)\r\n- `BottomNav.tsx` uses `h-16 pb-safe` which mixes Tailwind and safe-area variables correctly.\r\n\r\n### 3D \u2014 Animation \u0026 Motion Audit\r\n- `framer-motion` properties observed in `Home.tsx` and `ContextVisualizer.tsx`.\r\n- CSS Animations in `Home.css`:\r\n  - `@keyframes shimmer` (loading states)\r\n  - `@keyframes fadeSlideUp` (card entrances)\r\n  - `@keyframes scaleIn` (FAB mini buttons)\r\n  - `@keyframes badgePop` (notification pills)\r\n- **Gap:** Missing `@media (prefers-reduced-motion: reduce)` fallbacks in `Home.css` for `fadeSlideUp`, `scaleIn`, and `badgePop`.\r\n\r\n### 3E \u2014 Provider Accent System\r\n*(Extracted from `Home.css` L236-L245)*\r\n- `.chatgpt`: `#10b981` to `#059669`\r\n- `.claude`: `#f97316` to `#ea580c`\r\n- `.gemini`: `#3b82f6` to `#1d4ed8`\r\n- `.grok`: `#ef4444` to `#b91c1c`\r\n- `.perplexity`: `#8b5cf6` to `#6d28d9`\r\n- `.deepseek`: `#06b6d4` to `#0891b2`\r\n- `.kimi`: `#ec4899` to `#be185d`\r\n- `.qwen`: `#6366f1` to `#4f46e5`\r\n\r\n---\r\n\r\n## DOCUMENT 4 \u2014 STATE ARCHITECTURE MAP\r\n\r\n### 4A \u2014 Zustand Store Inventory\r\n\r\n**Store: `useAppStore`**\r\n- **File:** `pwa/src/lib/stores/appStore.ts`\r\n- **State Shape:**\r\n  - `identity`: { did, publicKey, displayName, avatar, verified, createdAt }\r\n  - `network`: { status, peerCount, lastSync, pendingOperations, bootstrapNodes }\r\n  - `storage`: { localUsed, localCapacity, ipfsPinned, ipfsPins, activeDeals, defaultVisibility }\r\n  - `ai`: { activeProvider, availableProviders, memoryEnabled, contextWindowUsed }\r\n  - `ui`: { theme, sidebarCollapsed, activeConversation, notifications }\r\n  - `sovereignty`: { defaultStorageLocation, requireExplicitConsent, encryptByDefault, allowAnalytics }\r\n  - `social`: { circles, following, followers }\r\n- **Actions:** \r\n  - `setIdentity`, `setNetworkStatus`, `updateStorageStats`, `exportAllData` (STUBBED), `importData` (STUBBED).\r\n- **Persistence:** Persisted to `localStorage` using `zustand/middleware` `persist` with `createJSONStorage`. Uses `partialize` to exclude temporary state (though currently partializing almost everything).\r\n- **Known Issues:** \r\n  - `exportAllData` and `importData` actions contain `// TODO: Connect to backend API` and only run `console.log`.\r\n\r\n**Store: `useHomeUIStore`**\r\n- **File:** `pwa/src/stores/useHomeUIStore.ts`\r\n- **State Shape:** `filterTab`, `viewMode`, `searchQuery`, `sortBy`, `fabExpanded`.\r\n- **Actions:** Standard setters (`setFilterTab`, etc.)\r\n- **Persistence:** NOT persisted. Reloading resets view to `list` and `all`.\r\n\r\n### 4B \u2014 TanStack Query Key Registry\r\n- `['conversations']` -\u003e `apiClient.get('/conversations')` (Observed in `Home.tsx` overview documentation).\r\n\r\n### 4C \u2014 IndexedDB Schema (Dexie)\r\n- **Database Name:** `vivim`\r\n- **File:** `pwa/src/lib/db.ts`\r\n- **Tables:**\r\n  - `conversations`: Indexed by `id, provider, createdAt, synced`.\r\n  - `messages`: Indexed by `id, conversationId, createdAt`.\r\n  - `settings`: Indexed by `key`.\r\n  - `syncQueue`: Indexed by `id, type, status, createdAt`.\r\n- **Sync Logic:** `syncQueue` handles offline operations. If offline, mutations go to `syncQueue`. Handled by `DataSyncService` when online.\r\n\r\n---\r\n\r\n## DOCUMENT 5 \u2014 API CONTRACT COMPLETENESS AUDIT\r\n\r\n### 5A \u2014 Express API Endpoints\r\n\r\n**Endpoint: GET `/api/admin/system/stats`**\r\n- Handler: `server/src/routes/admin/system.js` L21\r\n- Auth: `requireAdminAuth`\r\n- Input: None\r\n- Response: JSON object with `cpu`, `memory`, `disk`, `uptime`.\r\n- Status: \u274c STUBBED. Disk stats are mocked (`1000000000000`).\r\n\r\n**Endpoint: GET `/api/admin/database/tables`**\r\n- Handler: `server/src/routes/admin/database.js` L45\r\n- Auth: Admin\r\n- Input: None\r\n- Response: Array of table info.\r\n- Status: \u274c STUBBED. Uses `mockTables` array. `// TODO: Use Prisma introspection`.\r\n\r\n**Endpoint: POST `/api/admin/database/query`**\r\n- Handler: `server/src/routes/admin/database.js` L94\r\n- Auth: Admin\r\n- Input: `{ query: string }`\r\n- Response: Query execution result.\r\n- Status: \u26a0\ufe0f SECURITY RISK / PARTIAL. Executes raw SQL via `prisma.$queryRawUnsafe`. Tries to restrict to `SELECT` via string matching (`startsWith('SELECT')`), which is trivial to bypass with spaces or comments.\r\n\r\n**Endpoint: POST `/api/admin/crdt/documents/:id/resolve`**\r\n- Handler: `server/src/routes/admin/crdt.js` L156\r\n- Auth: Admin\r\n- Input: `{ resolution: any }`\r\n- Response: Success message.\r\n- Status: \u274c STUBBED. `// TODO: Integrate with CRDTSyncService to actually resolve conflicts`.\r\n\r\n**Endpoint: GET `/api/v1/health/detailed`**\r\n- Handler: `server/src/routes/admin/system.js` L189\r\n- Status: Partially implemented. Hardcodes network and storage as `'up'`.\r\n\r\n### 5B \u2014 SDK Node Methods\r\n\r\n**Node: AdminNetworkService** (`server/src/services/admin-network-service.js`)\r\n- Methods: `getNodes()`, `getConnections()`, `getMetrics()`\r\n- Status: \u274c ENTIRELY STUBBED. All methods contain `// TODO: Integrate with NetworkNode package` and return empty internal class arrays.\r\n\r\n---\r\n\r\n## DOCUMENT 6 \u2014 SOCKET \u0026 REAL-TIME AUDIT\r\n\r\n**File:** `server/src/services/socket.ts`\r\n\r\n- **Initialization:** Created via `SocketIOServer` attached to Express HTTP server.\r\n- **Events Listened:**\r\n  - `sync:pull` -\u003e Calls `handleSyncPull`\r\n  - `sync:push` -\u003e Calls `handleSyncPush`\r\n  - `join`, `leave`, `offer`, `answer`, `ice` -\u003e WebRTC Signaling\r\n- **Events Emitted:**\r\n  - `feed:delta` (Broadcasts creation/update/delete of entities)\r\n  - `sync:response`\r\n  - `sync:ack`\r\n  - `sync:error`\r\n\r\n**Critical Sync Trace (`sync:push`):**\r\n1. Client emits `sync:push` with `{ changes }`.\r\n2. Server `handleConnection` maps it to `this.handleSyncPush(socket, data)`.\r\n3. `handleSyncPush` executes (Line 158).\r\n4. **Execution stops here.** The method contains:\r\n   ```typescript\r\n   handleSyncPush(socket, { changes }) {\r\n     // TODO: Implement write-back logic\r\n     logger.info({ changes }, 'Received sync push');\r\n     socket.emit('sync:ack', { status: 'processed' });\r\n   }\r\n   ```\r\n5. **IMPACT:** Client sends data to sync to the server. The server logs it, drops it on the floor, and lies to the client by sending `sync:ack status: 'processed'`. The database is NEVER updated.\r\n\r\n---\r\n\r\n## DOCUMENT 7 \u2014 MOBILE-FIRST READINESS AUDIT\r\n\r\n### 7A \u2014 Touch \u0026 Gesture Inventory\r\n- `Home.tsx` FeedItemCards have `onClick` routing, but no native swipe-to-archive/pin gestures are implemented (despite the design system calling for iOS-style interactions).\r\n- The `ContextVisualizer` uses standard clicks for expansions. No pinch-to-zoom on graph views.\r\n\r\n### 7B \u2014 Viewport \u0026 Safe Area Audit\r\n- `index.css` defines `.safe-top`, `.safe-bottom`, etc.\r\n- `BottomNav.tsx` correctly implements `pb-safe` to avoid the iOS home indicator.\r\n- **Gap:** The FAB in `Home.tsx` (`bottom: 76px`) uses a hardcoded pixel value that does not account for `env(safe-area-inset-bottom)`, meaning it might overlap with the `BottomNav` on notched devices.\r\n\r\n### 7C \u2014 Navigation Pattern Audit\r\n- The `BottomNav` provides primary tab navigation (Home, Chain Chat, Search, Capture, AI, Settings).\r\n- Desktop uses a wrapper but relies on the exact same `BottomNav` pinned to the bottom. There is no responsive switch to a left-side rail/sidebar on desktop. The UI just stretches.\r\n\r\n### 7D \u2014 Performance on Mobile\r\n- `Home.tsx` implements `@tanstack/react-virtual` (`useWindowVirtualizer`) for the conversation feed. This is excellent for mobile DOM performance.\r\n- However, the virtualizer uses dynamic heights (`estimateSize`) with hardcoded values (`600`, `180`, `140`) that break if the text wraps significantly on narrow screens, causing scroll jank.\r\n\r\n### 7E \u2014 PWA Installation \u0026 Offline Audit\r\n- Uses `vite-plugin-pwa` with a `NetworkFirst` strategy for `/api/`.\r\n- Offline state is robustly handled via `Dexie` IndexedDB + `SyncQueue`.\r\n- The `SyncIndicator.tsx` accurately displays offline state.\r\n\r\n---\r\n\r\n## DOCUMENT 8 \u2014 IMPLEMENTATION GAP EXPANSION\r\n\r\n**Gap ID: VIVIM-GAP-014**\r\n- **File:** `server/src/services/socket.ts`\r\n- **Line(s):** 158-161\r\n- **Classification:** CRITICAL\r\n- **Category:** DATA_MISMATCH\r\n- **Description:** Real-time data sync from client to server drops all data.\r\n- **Evidence:** `// TODO: Implement write-back logic` inside `handleSyncPush`.\r\n- **Impact:** Any changes made by users offline or via local-first interaction are never saved to the Postgres database, leading to permanent data divergence.\r\n- **Fix:** Implement `handleSyncPush` to parse the `changes` array, open a Prisma transaction, and apply the UPSERT/DELETE operations to the respective tables (`Conversation`, `Message`, `AtomicChatUnit`), then trigger a `ContextEventBus` invalidation.\r\n\r\n**Gap ID: VIVIM-GAP-015**\r\n- **File:** `server/src/routes/admin/database.js`\r\n- **Line(s):** 105\r\n- **Classification:** CRITICAL\r\n- **Category:** SECURITY\r\n- **Description:** SQL Injection vulnerability in admin query execution.\r\n- **Evidence:** `if (!trimmedQuery.startsWith('SELECT')) ... await prisma.$queryRawUnsafe(query);`\r\n- **Impact:** An admin (or compromised admin token) can execute destructive queries like `SELECT 1; DROP TABLE users;` because `startsWith` does not prevent stacked queries.\r\n- **Fix:** Remove this endpoint entirely, or replace `queryRawUnsafe` with a strictly parameterized, restricted read-only connection role at the database level.\r\n\r\n**Gap ID: VIVIM-GAP-016**\r\n- **File:** `pwa/src/lib/stores/appStore.ts`\r\n- **Line(s):** 244-252\r\n- **Classification:** HIGH\r\n- **Category:** MISSING_IMPL\r\n- **Description:** Data export and import functions are mocked.\r\n- **Evidence:** `exportAllData: async () =\u003e { // TODO: Connect to backend API }`\r\n- **Impact:** Fails GDPR and data sovereignty guarantees stated in the product manifesto.\r\n- **Fix:** Wire `exportAllData` to call `GET /api/v2/portability/export` and handle the resulting file download blob.\r\n\r\n**Gap ID: VIVIM-GAP-017**\r\n- **File:** `server/src/services/admin-network-service.js`\r\n- **Line(s):** 16, 42, 57\r\n- **Classification:** MEDIUM\r\n- **Category:** STUB\r\n- **Description:** Admin network telemetry is completely stubbed.\r\n- **Evidence:** Returns empty arrays `this.nodes`, `this.connections` with `// TODO: Integrate with NetworkNode package`.\r\n- **Impact:** The Admin Panel network graph and peer lists show zero data.\r\n- **Fix:** Inject the `NetworkNode` libp2p instance into this service and map `networkNode.getConnections()` to the admin output format.\r\n\r\n**Gap ID: VIVIM-GAP-018**\r\n- **File:** `server/src/services/unified-context-service.ts`\r\n- **Line(s):** 252\r\n- **Classification:** LOW\r\n- **Category:** BROKEN_PATTERN\r\n- **Description:** Context bundles are invalidated via direct Prisma writes instead of using the designated event bus / invalidation service.\r\n- **Evidence:** `// TODO: Move this to InvalidationService once implemented`\r\n- **Impact:** Cache race conditions and tightly coupled database logic in the context service.\r\n- **Fix:** Dispatch a `BUNDLE_INVALIDATED` event to `ContextEventBus` and let the dedicated service handle the Prisma updates.\r\n\r\n---\r\n\r\n## DOCUMENT 9 \u2014 ENHANCEMENT ROADMAP (EXPANDED)\r\n\r\n### ID: ENH-001\r\n**Title:** Resolve Critical Sync \u0026 Security Vulnerabilities\r\n**Tier:** \ud83d\udd34 FOUNDATION\r\n**Priority Rank within Tier:** 1\r\n\r\n**Problem Statement:**\r\nThe sync engine currently drops client data on the floor (`socket.ts`), rendering offline-first promises void. Simultaneously, the admin database query endpoint (`database.js`) allows raw SQL injection.\r\n\r\n**Proposed Solution:**\r\n1. In `server/src/services/socket.ts`, implement Prisma upserts inside `handleSyncPush` matching the entity types (conversations, messages).\r\n2. Remove or strictly sanitize the `/api/admin/database/query` endpoint in `server/src/routes/admin/database.js`.\r\n\r\n**Acceptance Criteria:**\r\n- [ ] Offline edits to a conversation successfully persist to Postgres when the client reconnects.\r\n- [ ] Admin query endpoint rejects stacked queries or is entirely disabled.\r\n\r\n**Files to Change:**\r\n- `server/src/services/socket.ts`\r\n- `server/src/routes/admin/database.js`\r\n\r\n**Effort:** M\r\n**Impact:** HIGH\r\n**Dependencies:** None\r\n\r\n---\r\n\r\n### ID: ENH-002\r\n**Title:** Admin Telemetry and Introspection Implementation\r\n**Tier:** \ud83d\udd34 FOUNDATION\r\n**Priority Rank within Tier:** 2\r\n\r\n**Problem Statement:**\r\nThe Admin dashboard displays mocked data for Database tables, System resources, and Network peers.\r\n\r\n**Proposed Solution:**\r\n1. Update `system.js` to use Node.js `os` module for accurate memory/CPU mapping.\r\n2. Update `database.js` to use Prisma's `$queryRaw` to fetch pg_catalog statistics for table sizes.\r\n3. Update `admin-network-service.js` to pull connections from the libp2p instance.\r\n\r\n**Acceptance Criteria:**\r\n- [ ] Admin panel shows actual active peer counts.\r\n- [ ] Database panel shows actual rows and bytes for `Conversation` and `Message` tables.\r\n\r\n**Files to Change:**\r\n- `server/src/routes/admin/system.js`\r\n- `server/src/routes/admin/database.js`\r\n- `server/src/services/admin-network-service.js`\r\n\r\n**Effort:** M\r\n**Impact:** HIGH\r\n**Dependencies:** None\r\n\r\n---\r\n\r\n### ID: ENH-003\r\n**Title:** Desktop Navigation Architecture Redesign\r\n**Tier:** \ud83d\udfe1 EXPERIENCE\r\n**Priority Rank within Tier:** 1\r\n\r\n**Problem Statement:**\r\nDesktop users currently view a stretched mobile UI with a `BottomNav`, which violates modern responsive design patterns and wastes horizontal space.\r\n\r\n**Proposed Solution:**\r\nCreate a conditional navigation wrapper in `ResponsiveLayout.tsx`. Render `BottomNav` only on screens `\u003c1024px`. Render a new `SideNav` component on screens `\u003e=1024px`. \r\n\r\n**Acceptance Criteria:**\r\n- [ ] Desktop screens hide the bottom navigation bar.\r\n- [ ] Desktop screens show a left-aligned vertical sidebar with identical routing capabilities.\r\n\r\n**New Files Required:**\r\n- `pwa/src/components/layout/SideNav.tsx`\r\n\r\n**Effort:** S\r\n**Impact:** HIGH\r\n**Dependencies:** None\r\n\r\n---\r\n\r\n## DOCUMENT 10 \u2014 2026 FRONTEND MODERNIZATION BLUEPRINT\r\n\r\n### 10A \u2014 Design Language Recommendation\r\n**Philosophy: \"Neo-Glassmorphic Knowledge Hub\"**\r\nVIVIM is a \"digital brain\". The design should feel deep, precise, and transparent.\r\n- **Typography:** Replace generic `Inter` with **Geist** (or **Geist Sans**) for the interface (precise, technical) and **Geist Mono** for all code/data representations.\r\n- **Color System:** Dark-first. Backgrounds should be deep OLED black (`#000000`) with surfaces using varying opacities of `white/5` to `white/10` paired with heavy background blur (`backdrop-blur-2xl`) to create visual depth.\r\n- **Accents:** Evolve the Indigo/Violet/Emerald palette into intense, highly saturated neon gradients that contrast sharply against the black background. \r\n\r\n### 10B \u2014 Responsive Layout System\r\n- **Mobile (\u003c768px):** 100% width. `BottomNav` handling top-level routing. Modals open as bottom sheets (drawer pattern). \r\n- **Tablet (768px \u2013 1024px):** 100% width, but max-width constrained content areas. Modals open as centered dialogs.\r\n- **Desktop (\u003e1024px):** Global layout shifts. `BottomNav` disappears. A permanent left `SideNav` (width 260px) appears. The main content area utilizes a fluid grid.\r\n- **Safe Areas:** Strict enforcement of `pb-[env(safe-area-inset-bottom)]` on the `BottomNav` and `pt-[env(safe-area-inset-top)]` on TopBars.\r\n\r\n### 10C \u2014 Component Upgrade Specifications\r\n\r\n**Component: `ConversationCard` (FeedItemCard)**\r\n- **Current State:** Basic card with hardcoded gradient tops, opacity issues on archived items.\r\n- **2026 Target State:** A glassmorphic card that feels like a physical object. \r\n- **Mobile Layout:** Full width minus 16px padding.\r\n- **Desktop Layout:** Masonry grid layout, max width 400px per card.\r\n- **Interaction Model:** `transform: scale(0.98)` on active. Spacebar triggers the `onContinue` action.\r\n- **Dark Mode:** `bg-white/5` with `border-white/10`. Hover state elevates the border to `border-white/20` and adds a subtle glow based on the provider color.\r\n- **Accessibility:** Ensure `tabIndex={0}`, handle `onKeyDown` for Space/Enter. Use `\u003cspan className=\"sr-only\"\u003e` for the stats (words, messages, code blocks).\r\n\r\n**Component: `ContextVisualizer`**\r\n- **Current State:** Standard HTML divs with inline styles for colors.\r\n- **2026 Target State:** Animated, smooth transition panel using `framer-motion` layout animations.\r\n- **Animation:** Expand/collapse must use `\u003cAnimatePresence\u003e` with `height: \"auto\", opacity: 1` and spring physics (`stiffness: 300, damping: 30`).\r\n- **Implementation Notes:** Map the hardcoded hex values to CSS custom properties defined in the new token system.\r\n\r\n### 10D \u2014 Navigation Unification Plan\r\nCreate a unified `AppNavigation` container that wraps the Router.\r\n- `\u003cMobileNav /\u003e` renders via CSS media queries (`block lg:hidden`).\r\n- `\u003cDesktopSidebar /\u003e` renders via CSS media queries (`hidden lg:flex`).\r\n- The active route state is derived directly from `react-router-dom`'s `useLocation`.\r\n- Deep routes (like `/conversation/:id`) will push a full-screen overlay on Mobile (hiding the BottomNav), but on Desktop, they will open in the main content pane while the sidebar remains visible.\r\n\r\n### 10E \u2014 Token System Spec\r\nTo be injected into `pwa/src/styles/design-system.css`:\r\n\r\n```css\r\n@layer base {\r\n  :root {\r\n    /* Brand Colors */\r\n    --color-brand-primary: #6366f1;\r\n    --color-brand-secondary: #8b5cf6;\r\n    \r\n    /* Semantic Surfaces (Light) */\r\n    --surface-base: #ffffff;\r\n    --surface-elevated: #f8f9fb;\r\n    --surface-glass: rgba(255, 255, 255, 0.7);\r\n    \r\n    /* Borders */\r\n    --border-subtle: rgba(0, 0, 0, 0.05);\r\n    --border-strong: rgba(0, 0, 0, 0.15);\r\n  }\r\n\r\n  .dark {\r\n    /* Semantic Surfaces (Dark) */\r\n    --surface-base: #000000;\r\n    --surface-elevated: #0a0a0f;\r\n    --surface-glass: rgba(20, 20, 25, 0.6);\r\n    \r\n    /* Borders */\r\n    --border-subtle: rgba(255, 255, 255, 0.05);\r\n    --border-strong: rgba(255, 255, 255, 0.15);\r\n\r\n    /* Provider Tokens (Replacing hardcoded gradients) */\r\n    --provider-chatgpt-start: #10b981;\r\n    --provider-chatgpt-end: #059669;\r\n    --provider-claude-start: #f97316;\r\n    --provider-claude-end: #ea580c;\r\n    --provider-gemini-start: #3b82f6;\r\n    --provider-gemini-end: #1d4ed8;\r\n  }\r\n}\r\n```\r\n*Implementation Note: Tailwind configuration must be updated to map these variables to utility classes (e.g., `bg-surface-glass`).*", "type": "file"}, "start_ix": 99}], "code_blocks": {"0": {"edited": false, "id": "mv5f2f"}, "1": {"edited": false, "id": "d83he4"}, "2": {"edited": false, "id": "tp3ayq"}, "3": {"edited": false, "id": "ua2nv0"}}, "content_references": [{"alt": null, "cloud_doc_url": null, "connector_id": null, "drug_file_reference": null, "end_idx": 120, "fff_metadata": null, "id": "file_00000000e3c4720a8d6f5e96289008bd", "input_pointer": {"file_index": 0, "line_range_end": null, "line_range_start": null, "message_id": "95dddba8-49a2-4b55-93af-ccd5f39e3b5c", "message_index": 0}, "matched_text": "\ue200f
