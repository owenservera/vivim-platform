<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVIM - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 400px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      margin-bottom: 2rem;
      font-size: 0.875rem;
      color: #888;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    button:hover {
      background: #e5e5e5;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .features {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      color: #888;
      font-size: 0.875rem;
    }

    .feature-icon {
      color: #10b981;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📴</div>
    <h1>You're Offline</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>No internet connection</span>
    </div>
    <p>
      Check your connection and try again. Your cached data is still available once you're back online.
    </p>
    <button onclick="window.location.reload()">
      Retry Connection
    </button>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Your conversations are saved locally</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Auto-sync when reconnected</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Install for better offline access</span>
      </div>
    </div>
  </div>

  <script>
    // Auto-retry when connection is restored
    let retryCount = 0;
    const maxRetries = 5;

    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Periodic retry
    const retryInterval = setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }

      retryCount++;
      if (retryCount >= maxRetries) {
        clearInterval(retryInterval);
      }
    }, 10000); // Check every 10 seconds

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      clearInterval(retryInterval);
    });
  </script>
</body>
</html>
